<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kart Racing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0a0a0a;
    }
    #game-container { width: 100vw; height: 100vh; }
    
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      z-index: 100;
      pointer-events: none;
    }
    
    #position {
      font-size: 72px;
      font-weight: 900;
      text-shadow: 4px 4px 0 #ff4444, 6px 6px 0 #000;
      line-height: 1;
    }
    #position span { font-size: 28px; }
    
    #lap {
      font-size: 32px;
      font-weight: 700;
      margin-top: 10px;
      text-shadow: 2px 2px 0 #000;
    }
    
    #speedometer {
      position: fixed;
      bottom: 30px;
      right: 30px;
      color: #fff;
      z-index: 100;
      text-align: right;
      pointer-events: none;
    }
    
    #speed-value {
      font-size: 56px;
      font-weight: 900;
      text-shadow: 3px 3px 0 #0066cc;
    }
    #speed-value span { font-size: 22px; }
    
    #start-screen, #end-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    
    #end-screen { display: none; }
    
    h1 {
      font-size: 80px;
      font-weight: 900;
      color: #fff;
      text-shadow: 4px 4px 0 #ff4444;
      margin-bottom: 20px;
    }
    
    p {
      font-size: 22px;
      color: #aaa;
      margin-bottom: 40px;
    }
    
    .btn {
      padding: 20px 70px;
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(180deg, #ff6644, #ff4444);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #cc2222, 0 10px 20px rgba(0,0,0,0.4);
      transition: all 0.1s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #cc2222; }
    
    #controls-info {
      margin-top: 40px;
      color: #888;
      text-align: center;
      font-size: 16px;
    }
    .key {
      display: inline-block;
      background: #333;
      padding: 6px 14px;
      border-radius: 6px;
      margin: 0 3px;
      font-weight: 700;
      color: #fff;
    }
    
    #countdown {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 180px;
      font-weight: 900;
      color: #fff;
      text-shadow: 6px 6px 0 #ff4444;
      z-index: 150;
      display: none;
      pointer-events: none;
    }
    
    #results {
      font-size: 42px;
      color: #aaa;
      margin-bottom: 30px;
    }
    
    #minimap {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 160px;
      height: 160px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      border: 3px solid #444;
      z-index: 100;
    }
    #minimap canvas { width: 100%; height: 100%; border-radius: 7px; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <div id="hud">
    <div id="position">1<span>st</span></div>
    <div id="lap">Lap 1 / 3</div>
  </div>
  
  <div id="speedometer">
    <div id="speed-value">0<span> km/h</span></div>
  </div>
  
  <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
  
  <div id="countdown">3</div>
  
  <div id="start-screen">
    <h1>KART RACE</h1>
    <p>Race against 7 opponents!</p>
    <button class="btn" id="start-btn">START</button>
    <div id="controls-info">
      <div><span class="key">W</span> Accelerate &nbsp; <span class="key">S</span> Brake</div>
      <div><span class="key">A</span> <span class="key">D</span> Steer &nbsp; <span class="key">SPACE</span> Drift</div>
    </div>
  </div>
  
  <div id="end-screen">
    <h1 id="end-title">FINISH!</h1>
    <div id="results"></div>
    <button class="btn" id="restart-btn">RACE AGAIN</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    
    // Game state
    const state = {
      started: false,
      finished: false,
      speed: 0,
      lap: 1,
      checkpoint: 0,
      maxSpeed: 0.8,
      accel: 0.02,
      friction: 0.008,
      turnSpeed: 0.045,
      drifting: false
    };
    
    const keys = { w: false, s: false, a: false, d: false, space: false };
    
    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2288aa);
    scene.fog = new THREE.Fog(0x2288aa, 150, 500);
    
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.getElementById('game-container').appendChild(renderer.domElement);
    
    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -200;
    sun.shadow.camera.right = 200;
    sun.shadow.camera.top = 200;
    sun.shadow.camera.bottom = -200;
    scene.add(sun);
    
    // Track - oval shape with corners
    const trackPoints = [];
    const numPoints = 40;
    
    for (let i = 0; i < numPoints; i++) {
      const t = (i / numPoints) * Math.PI * 2;
      const rx = 140;
      const ry = 90;
      
      // Make it more rectangular-ish
      const x = Math.sign(Math.cos(t)) * rx * Math.pow(Math.abs(Math.cos(t)), 0.6);
      const y = Math.sign(Math.sin(t)) * ry * Math.pow(Math.abs(Math.sin(t)), 0.6);
      
      trackPoints.push(new THREE.Vector3(x, 0, y));
    }
    
    // Ground
    const groundGeo = new THREE.PlaneGeometry(600, 600);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d5a27 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Track surface
    const trackWidth = 24;
    
    function createTrackSurface() {
      const roadMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
      const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const edgeMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
      const edgeMat2 = new THREE.MeshLambertMaterial({ color: 0xffffff });
      
      for (let i = 0; i < trackPoints.length; i++) {
        const p1 = trackPoints[i];
        const p2 = trackPoints[(i + 1) % trackPoints.length];
        
        const dir = new THREE.Vector3().subVectors(p2, p1);
        const len = dir.length();
        dir.normalize();
        
        const perp = new THREE.Vector3(-dir.z, 0, dir.x);
        const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        
        // Road
        const roadGeo = new THREE.PlaneGeometry(trackWidth, len + 0.5);
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.rotation.z = Math.atan2(dir.x, dir.z);
        road.position.set(center.x, 0.05, center.z);
        road.receiveShadow = true;
        scene.add(road);
        
        // Center dashes
        if (i % 3 === 0) {
          const dashGeo = new THREE.PlaneGeometry(0.6, len * 0.4);
          const dash = new THREE.Mesh(dashGeo, lineMat);
          dash.rotation.x = -Math.PI / 2;
          dash.rotation.z = Math.atan2(dir.x, dir.z);
          dash.position.set(center.x, 0.06, center.z);
          scene.add(dash);
        }
        
        // Track edges (barriers)
        const edgeGeo = new THREE.BoxGeometry(1.2, 1, len + 0.5);
        
        const leftEdge = new THREE.Mesh(edgeGeo, i % 2 === 0 ? edgeMat : edgeMat2);
        leftEdge.position.set(
          center.x + perp.x * (trackWidth / 2 + 0.6),
          0.5,
          center.z + perp.z * (trackWidth / 2 + 0.6)
        );
        leftEdge.rotation.y = Math.atan2(dir.x, dir.z);
        leftEdge.castShadow = true;
        scene.add(leftEdge);
        
        const rightEdge = new THREE.Mesh(edgeGeo, i % 2 === 0 ? edgeMat2 : edgeMat);
        rightEdge.position.set(
          center.x - perp.x * (trackWidth / 2 + 0.6),
          0.5,
          center.z - perp.z * (trackWidth / 2 + 0.6)
        );
        rightEdge.rotation.y = Math.atan2(dir.x, dir.z);
        rightEdge.castShadow = true;
        scene.add(rightEdge);
      }
    }
    
    createTrackSurface();
    
    // Start/finish line
    const startGeo = new THREE.PlaneGeometry(trackWidth, 3);
    const startMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const startLine = new THREE.Mesh(startGeo, startMat);
    startLine.rotation.x = -Math.PI / 2;
    startLine.position.set(trackPoints[0].x, 0.07, trackPoints[0].z);
    scene.add(startLine);
    
    // Checkered pattern
    for (let i = 0; i < 12; i++) {
      for (let j = 0; j < 2; j++) {
        if ((i + j) % 2 === 0) {
          const checkGeo = new THREE.PlaneGeometry(2, 1.5);
          const checkMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
          const check = new THREE.Mesh(checkGeo, checkMat);
          check.rotation.x = -Math.PI / 2;
          check.position.set(trackPoints[0].x - 11 + i * 2, 0.08, trackPoints[0].z - 0.75 + j * 1.5);
          scene.add(check);
        }
      }
    }
    
    // Kart creation
    function createKart(color, isPlayer = false) {
      const group = new THREE.Group();
      
      // Body
      const bodyGeo = new THREE.BoxGeometry(1.8, 0.5, 2.8);
      const bodyMat = new THREE.MeshLambertMaterial({ color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.4;
      body.castShadow = true;
      group.add(body);
      
      // Top
      const topGeo = new THREE.BoxGeometry(1.2, 0.4, 1);
      const topMat = new THREE.MeshLambertMaterial({ color: isPlayer ? 0xffaa00 : 0x222222 });
      const top = new THREE.Mesh(topGeo, topMat);
      top.position.set(0, 0.75, -0.2);
      top.castShadow = true;
      group.add(top);
      
      // Wheels
      const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 12);
      const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
      const wheelPos = [[-0.9, 0.35, 0.9], [0.9, 0.35, 0.9], [-0.9, 0.35, -0.9], [0.9, 0.35, -0.9]];
      
      group.wheels = [];
      wheelPos.forEach(p => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...p);
        group.add(wheel);
        group.wheels.push(wheel);
      });
      
      return group;
    }
    
    // Player
    const player = createKart(0xff4444, true);
    player.position.set(trackPoints[0].x + 5, 0.1, trackPoints[0].z - 4);
    player.rotation.y = -Math.PI / 2;
    scene.add(player);
    
    // AI
    const aiKarts = [];
    const aiColors = [0x4488ff, 0x44ff44, 0xffff44, 0xff44ff, 0x44ffff, 0xff8844, 0x88ff44];
    
    for (let i = 0; i < 7; i++) {
      const kart = createKart(aiColors[i]);
      const row = Math.floor((i + 1) / 2);
      const side = i % 2 === 0 ? -1 : 1;
      
      kart.position.set(
        trackPoints[0].x + 5 + row * 5,
        0.1,
        trackPoints[0].z + side * 4
      );
      kart.rotation.y = -Math.PI / 2;
      kart.targetIdx = 0;
      kart.speed = 0;
      kart.lap = 1;
      kart.checkpoint = 0;
      kart.baseSpeed = 0.5 + Math.random() * 0.2;
      kart.skillOffset = Math.random() * Math.PI * 2;
      scene.add(kart);
      aiKarts.push(kart);
    }
    
    // Particles for drift
    const particles = [];
    const particleGeo = new THREE.SphereGeometry(0.2, 6, 6);
    const particleMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true });
    
    for (let i = 0; i < 40; i++) {
      const p = new THREE.Mesh(particleGeo, particleMat.clone());
      p.visible = false;
      p.life = 0;
      scene.add(p);
      particles.push(p);
    }
    
    let particleIdx = 0;
    
    function spawnParticle(pos) {
      const p = particles[particleIdx];
      p.position.copy(pos);
      p.position.y = 0.3;
      p.life = 1;
      p.visible = true;
      p.scale.setScalar(1);
      particleIdx = (particleIdx + 1) % particles.length;
    }
    
    // Minimap
    const minimapCanvas = document.getElementById('minimap-canvas');
    minimapCanvas.width = 160;
    minimapCanvas.height = 160;
    const ctx = minimapCanvas.getContext('2d');
    
    function drawMinimap() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, 160, 160);
      
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 6;
      ctx.beginPath();
      trackPoints.forEach((p, i) => {
        const x = 80 + p.x * 0.4;
        const y = 80 + p.z * 0.4;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.stroke();
      
      aiKarts.forEach(kart => {
        ctx.fillStyle = '#' + aiColors[aiKarts.indexOf(kart)].toString(16).padStart(6, '0');
        ctx.beginPath();
        ctx.arc(80 + kart.position.x * 0.4, 80 + kart.position.z * 0.4, 5, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(80 + player.position.x * 0.4, 80 + player.position.z * 0.4, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Get next waypoint index
    function getNextWaypoint(pos, currentIdx) {
      const nextIdx = (currentIdx + 1) % trackPoints.length;
      const next = trackPoints[nextIdx];
      
      if (pos.distanceTo(next) < 25) {
        return nextIdx;
      }
      return currentIdx;
    }
    
    // Position calculation
    function getProgress(kart, checkpoint, lap) {
      return lap * 1000 + checkpoint * 10 - kart.position.distanceTo(trackPoints[(checkpoint + 1) % trackPoints.length]);
    }
    
    function calculatePosition() {
      const all = [
        { isPlayer: true, lap: state.lap, checkpoint: state.checkpoint, pos: player.position }
      ];
      
      aiKarts.forEach(kart => {
        all.push({ isPlayer: false, lap: kart.lap, checkpoint: kart.checkpoint, pos: kart.position, kart });
      });
      
      all.sort((a, b) => {
        if (b.lap !== a.lap) return b.lap - a.lap;
        if (b.checkpoint !== a.checkpoint) return b.checkpoint - a.checkpoint;
        return getProgress(a.pos, a.checkpoint, a.lap) - getProgress(b.pos, b.checkpoint, b.lap);
      });
      
      return all.findIndex(k => k.isPlayer) + 1;
    }
    
    // Update UI
    function updateUI() {
      const pos = calculatePosition();
      const suffix = pos === 1 ? 'st' : pos === 2 ? 'nd' : pos === 3 ? 'rd' : 'th';
      document.getElementById('position').innerHTML = `${pos}<span>${suffix}</span>`;
      document.getElementById('lap').textContent = `Lap ${state.lap} / 3`;
      
      const kmh = Math.round(state.speed * 180);
      document.getElementById('speed-value').innerHTML = `${kmh}<span> km/h</span>`;
    }
    
    // Update player
    function updatePlayer(dt) {
      if (!state.started || state.finished) return;
      
      // Acceleration
      if (keys.w) {
        const max = state.drifting ? state.maxSpeed * 1.4 : state.maxSpeed;
        state.speed = Math.min(state.speed + state.accel, max);
      } else if (keys.s) {
        state.speed = Math.max(state.speed - state.accel * 2, -0.3);
      } else {
        state.speed *= (1 - state.friction);
        if (Math.abs(state.speed) < 0.01) state.speed = 0;
      }
      
      // Steering
      const turn = state.turnSpeed * Math.min(state.speed / state.maxSpeed, 1);
      if (keys.a) player.rotation.y += turn;
      if (keys.d) player.rotation.y -= turn;
      
      // Drift
      state.drifting = keys.space && state.speed > 0.4;
      
      // Move
      const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      player.position.addScaledVector(fwd, state.speed);
      
      // Wheels
      player.wheels.forEach(w => w.rotation.x += state.speed * 0.4);
      
      // Drift particles
      if (state.drifting && Math.random() > 0.4) {
        spawnParticle(player.position);
      }
      
      // Check waypoint
      const newCP = getNextWaypoint(player.position, state.checkpoint);
      if (newCP !== state.checkpoint) {
        state.checkpoint = newCP;
        
        // Lap complete
        if (state.checkpoint === 0) {
          state.lap++;
          if (state.lap > 3) {
            state.finished = true;
            showEnd();
          }
        }
      }
    }
    
    // Update AI
    function updateAI(dt) {
      if (!state.started || state.finished) return;
      
      aiKarts.forEach(kart => {
        // Target waypoint
        const target = trackPoints[kart.targetIdx];
        const toTarget = new THREE.Vector3().subVectors(target, kart.position);
        
        // Aim at next waypoint
        const targetAngle = Math.atan2(toTarget.x, toTarget.z);
        let angleDiff = targetAngle - kart.rotation.y;
        
        // Normalize angle
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        
        // Steer
        const steerSpeed = 0.06;
        if (angleDiff > 0.05) {
          kart.rotation.y += Math.min(angleDiff, steerSpeed);
        } else if (angleDiff < -0.05) {
          kart.rotation.y += Math.max(angleDiff, -steerSpeed);
        }
        
        // Speed variation
        const speedVar = Math.sin(Date.now() * 0.002 + kart.skillOffset) * 0.08;
        const targetSpeed = kart.baseSpeed + speedVar;
        kart.speed += (targetSpeed - kart.speed) * 0.05;
        
        // Move forward
        const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(kart.quaternion);
        kart.position.addScaledVector(fwd, kart.speed);
        
        // Wheels
        kart.wheels.forEach(w => w.rotation.x += kart.speed * 0.4);
        
        // Check if reached waypoint
        if (toTarget.length() < 18) {
          kart.targetIdx = (kart.targetIdx + 1) % trackPoints.length;
          kart.checkpoint = kart.targetIdx;
          
          // Lap
          if (kart.targetIdx === 0) {
            kart.lap++;
          }
        }
      });
    }
    
    // Update particles
    function updateParticles(dt) {
      particles.forEach(p => {
        if (p.life > 0) {
          p.life -= dt * 2;
          p.position.y += 0.05;
          p.scale.setScalar(p.life * 1.5);
          p.material.opacity = p.life;
          if (p.life <= 0) p.visible = false;
        }
      });
    }
    
    // Camera
    function updateCamera() {
      const offset = new THREE.Vector3(0, 7, 12);
      offset.applyQuaternion(player.quaternion);
      
      const targetPos = player.position.clone().add(offset);
      camera.position.lerp(targetPos, 0.08);
      
      const look = player.position.clone();
      look.y += 1;
      camera.lookAt(look);
    }
    
    // Start
    document.getElementById('start-btn').onclick = () => {
      document.getElementById('start-screen').style.display = 'none';
      
      const countdownEl = document.getElementById('countdown');
      countdownEl.style.display = 'block';
      
      let count = 3;
      countdownEl.textContent = count;
      
      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          countdownEl.textContent = count;
        } else if (count === 0) {
          countdownEl.textContent = 'GO!';
          countdownEl.style.color = '#44ff44';
        } else {
          clearInterval(interval);
          countdownEl.style.display = 'none';
          state.started = true;
        }
      }, 1000);
    };
    
    function showEnd() {
      const pos = calculatePosition();
      const suffix = pos === 1 ? 'st' : pos === 2 ? 'nd' : pos === 3 ? 'rd' : 'th';
      
      document.getElementById('end-title').textContent = pos === 1 ? 'VICTORY!' : 'FINISH!';
      document.getElementById('results').textContent = `You finished ${pos}${suffix}!`;
      document.getElementById('end-screen').style.display = 'flex';
    }
    
    document.getElementById('restart-btn').onclick = () => location.reload();
    
    // Input
    document.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') keys.w = true;
      if (k === 's' || k === 'arrowdown') keys.s = true;
      if (k === 'a' || k === 'arrowleft') keys.a = true;
      if (k === 'd' || k === 'arrowright') keys.d = true;
      if (k === ' ') keys.space = true;
    });
    
    document.addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'arrowup') keys.w = false;
      if (k === 's' || k === 'arrowdown') keys.s = false;
      if (k === 'a' || k === 'arrowleft') keys.a = false;
      if (k === 'd' || k === 'arrowright') keys.d = false;
      if (k === ' ') keys.space = false;
    });
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Loop
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      
      const dt = clock.getDelta();
      
      updatePlayer(dt);
      updateAI(dt);
      updateParticles(dt);
      updateCamera();
      updateUI();
      drawMinimap();
      
      renderer.render(scene, camera);
    }
    
    animate();
  </script>
</body>
</html>
